<!DOCTYPE html><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Movilidad - Huarmey</title>
    <style>
        :root { --verde: #1B5E20; --amarillo: #FBC02D; --gris: #f1f3f5; }
        body { font-family: 'Segoe UI', sans-serif; background: #dee2e6; margin: 0; padding: 10px; }
        .card { background: white; max-width: 480px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-top: 10px solid var(--verde); }
        h2 { color: var(--verde); text-align: center; margin: 0 0 20px; font-size: 22px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 12px; color: #555; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ced4da; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background: #e9ecef; }
        .btn { background: var(--verde); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        .btn:disabled { background: #adb5bd; }
        
        .pendientes { max-width: 480px; margin: 25px auto; }
        .item-p { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 6px solid var(--amarillo); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status { text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-top: 15px; }
        .on { background: #d4edda; color: #155724; }
        .off { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="card">
    <h2>Agrícola Huarmey</h2>
    <form id="f">
        <label>Unidad (Placa)</label>
        <select id="placa" required onchange="v()"></select>

        <label>Conductor</label>
        <input type="text" id="conductor" readonly>

        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Tipo</label><input type="text" id="tipo" readonly></div>
            <div style="flex:1"><label>Capacidad</label><input type="number" id="cap" readonly></div>
        </div>

        <label>Ruta</label>
        <input type="text" id="ruta" readonly>

        <label>N° Pasajeros</label>
        <input type="number" id="pax" required oninput="calc()">

        <label>Asientos Libres</label>
        <input type="number" id="lib" readonly>

        <label>Observaciones</label>
        <textarea id="obs" rows="2"></textarea>

        <button type="submit" id="btn" class="btn">GUARDAR REGISTRO</button>
    </form>
    <div id="st" class="status on">● Conectado</div>
</div>

<div class="pendientes">
    <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px; color:#495057">
        <span>📦 COLA DE ENVÍO</span> <span id="cont">0</span>
    </div>
    <div id="list"></div>
</div>

<script src="https://unpkg.com/dexie@3.2.0/dist/dexie.min.js"></script>
<script>
    const URL = 'https://script.google.com/macros/s/AKfycbyjCGQW11p2-WXoAnKKQdyykU4sWC8y6TNq96SLClbHmeojHnPr-QvFEY8gNZx_Rr2f/exec'; // <--- PEGA TU URL AQUÍ
    const db = new Dexie('Huarmey_V5');
    db.version(1).stores({ m: 'placa', r: '++id, estado' });

    let ms = [];

    async function init() {
        if (navigator.onLine) {
            try {
                const res = await fetch(URL + '?t=' + Date.now());
                const data = await res.json();
                await db.m.clear();
                await db.m.bulkAdd(data);
            } catch (e) { console.log("Offline"); }
        }
        ms = await db.m.toArray();
        document.getElementById('placa').innerHTML = '<option value="">Seleccione placa...</option>' + 
            ms.map(i => `<option value="${i.placa}">${i.placa}</option>`).join('');
        dibujar();
    }

    function v() {
        const sel = ms.find(x => x.placa === document.getElementById('placa').value);
        if (sel) {
            document.getElementById('conductor').value = sel.conductor || '';
            document.getElementById('tipo').value = sel.tipo || '';
            document.getElementById('cap').value = sel.capacidad || 0;
            document.getElementById('ruta').value = sel.ruta || '';
            calc();
        }
    }

    function calc() {
        const c = parseInt(document.getElementById('cap').value) || 0;
        const p = parseInt(document.getElementById('pax').value) || 0;
        document.getElementById('lib').value = Math.max(0, c - p);
        document.getElementById('btn').disabled = (p > c || p <= 0);
    }

    async function dibujar() {
        const pends = await db.r.where('estado').equals('P').toArray();
        document.getElementById('cont').innerText = pends.length;
        document.getElementById('list').innerHTML = pends.map(p => `
            <div class="item-p">
                <span><b>${p.placa}</b> | Pax: ${p.pasajeros}</span>
                <span style="font-size:11px; color:#856404; font-weight:bold">PENDIENTE</span>
            </div>
        `).join('');
        const s = document.getElementById('st');
        s.className = navigator.onLine ? "status on" : "status off";
        s.innerText = navigator.onLine ? "● Conectado" : "● Modo Offline";
    }

    document.getElementById('f').onsubmit = async (e) => {
        e.preventDefault();
        const reg = {
            fecha: new Date().toLocaleString(),
            placa: document.getElementById('placa').value,
            conductor: document.getElementById('conductor').value,
            tipo: document.getElementById('tipo').value,
            ruta: document.getElementById('ruta').value,
            capacidad: document.getElementById('cap').value,
            pasajeros: document.getElementById('pax').value,
            libres: document.getElementById('lib').value,
            observaciones: document.getElementById('obs').value,
            estado: 'P'
        };
        await db.r.add(reg);
        document.getElementById('f').reset();
        alert("✅ Guardado localmente");
        dibujar();
        if (navigator.onLine) sync();
    };

    async function sync() {
        if (!navigator.onLine) return;
        const pends = await db.r.where('estado').equals('P').toArray();
        for (let r of pends) {
            try {
                const form = new URLSearchParams();
                const {id, estado, ...data} = r;
                for (const key in data) form.append(key, data[key]);
                await fetch(URL, { method: 'POST', mode: 'no-cors', body: form.toString(), headers: {'Content-Type': 'application/x-www-form-urlencoded'} });
                await db.r.update(r.id, { estado: 'E' });
            } catch (e) { break; }
        }
        dibujar();
    }

    window.addEventListener('online', sync);
    window.addEventListener('offline', dibujar);
    init();
</script>
</body>
</html>
