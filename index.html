<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrícola Huarmey - Movilidades 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        header { background-color: #ffffff; text-align: center; padding: 15px; border-bottom: 4px solid #4CAF50; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { max-width: 180px; height: auto; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; text-align: center; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background-color: #f9f9f9; cursor: not-allowed; }
        .btn-guardar { width: 100%; background-color: #4CAF50; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        .btn-guardar:disabled { background-color: #ccc; }
        .status-bar { margin-top: 20px; padding: 10px; text-align: center; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .online { background-color: #e8f5e9; color: #2e7d32; }
        .offline { background-color: #ffebee; color: #c62828; }
        #error-msg { color: #d32f2f; font-size: 13px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<header>
    <img src="https://i.imgur.com/REEMPLAZA_CON_TU_URL.png" alt="Agrícola Huarmey" class="logo">
</header>

<div class="container">
    <h2>Registro Movilidad</h2>
    <form id="formMovilidad">
        <label>Placa:</label>
        <select id="placa" required onchange="actualizarVehiculo()">
            <option value="">Cargando placas...</option>
        </select>

        <label>Conductor:</label>
        <select id="conductor" required>
            <option value="">Seleccione conductor</option>
        </select>

        <label>Capacidad:</label>
        <input type="number" id="capacidad" readonly>

        <label>N° Pasajeros:</label>
        <input type="number" id="pasajeros" required oninput="calcularLibres()">
        <div id="error-msg">⚠️ Supera la capacidad permitida</div>

        <label>Asientos Libres:</label>
        <input type="number" id="libres" readonly>

        <label>Observaciones:</label>
        <textarea id="observaciones" rows="3"></textarea>

        <button type="submit" id="btnGuardar" class="btn-guardar">GUARDAR REGISTRO</button>
    </form>

    <div id="status-bar" class="status-bar online">Comprobando conexión...</div>
</div>

<script src="https://unpkg.com/dexie@3.2.0/dist/dexie.min.js"></script>

<script>
    // --- CONFIGURACIÓN CRUCIAL ---
    // Reemplaza esta URL con la que te dio Google al "Implementar"
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxdrbbImNkjyLbelW3CFnvCeq5SN_DbDvcdGz_FZd3hyKnkRbi4mMXFGXwwYSQqPr2z/exec'; 

    // Base de datos local
    const db = new Dexie('HuarmeyDB');
    db.version(1).stores({
        maestros: '++id, placa, conductor, capacidad',
        registros: '++id, estado'
    });

    let listaMaestros = [];

    // 1. CARGAR DATOS AL INICIAR
    async function iniciar() {
        actualizarEstadoUI();
        try {
            if (navigator.onLine) {
                const res = await fetch(WEB_APP_URL, { method: 'GET', redirect: 'follow' });
                listaMaestros = await res.json();
                await db.maestros.clear();
                await db.maestros.bulkAdd(listaMaestros);
            } else {
                listaMaestros = await db.maestros.toArray();
            }
            llenarSelectores();
        } catch (e) {
            console.error("Error inicial:", e);
            document.getElementById('status-bar').innerHTML = "⚠️ Error al cargar datos maestros";
        }
    }

    function llenarSelectores() {
        const pSel = document.getElementById('placa');
        const cSel = document.getElementById('conductor');
        pSel.innerHTML = '<option value="">Seleccione placa</option>';
        
        // Evitar duplicados de conductores
        const conductoresUnicos = [...new Set(listaMaestros.map(m => m.conductor))];
        
        listaMaestros.forEach(m => {
            pSel.innerHTML += `<option value="${m.placa}">${m.placa}</option>`;
        });
        conductoresUnicos.forEach(c => {
            cSel.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }

    function actualizarVehiculo() {
        const placa = document.getElementById('placa').value;
        const v = listaMaestros.find(m => m.placa === placa);
        document.getElementById('capacidad').value = v ? v.capacidad : '';
        calcularLibres();
    }

    function calcularLibres() {
        const cap = parseInt(document.getElementById('capacidad').value) || 0;
        const pas = parseInt(document.getElementById('pasajeros').value) || 0;
        const lib = cap - pas;
        document.getElementById('libres').value = lib < 0 ? 0 : lib;
        
        const error = document.getElementById('error-msg');
        const btn = document.getElementById('btnGuardar');
        if (pas > cap) {
            error.style.display = 'block';
            btn.disabled = true;
        } else {
            error.style.display = 'none';
            btn.disabled = false;
        }
    }

    // 2. GUARDAR Y SINCRONIZAR
    document.getElementById('formMovilidad').onsubmit = async (e) => {
        e.preventDefault();
        const registro = {
            placa: document.getElementById('placa').value,
            conductor: document.getElementById('conductor').value,
            pasajeros: document.getElementById('pasajeros').value,
            libres: document.getElementById('libres').value,
            observaciones: document.getElementById('observaciones').value,
            fecha: new Date().toISOString(),
            estado: 'Pendiente'
        };

        const id = await db.registros.add(registro);
        document.getElementById('formMovilidad').reset();
        alert("✅ Registro guardado localmente");
        
        if (navigator.onLine) enviarAGoogle(id, registro);
        actualizarEstadoUI();
    };

    async function enviarAGoogle(id, datos) {
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            await db.registros.update(id, { estado: 'Enviado' });
            actualizarEstadoUI();
        } catch (e) {
            console.error("Error enviando:", e);
        }
    }

    async function actualizarEstadoUI() {
        const bar = document.getElementById('status-bar');
        const pendientes = await db.registros.where('estado').equals('Pendiente').count();
        
        if (navigator.onLine) {
            bar.className = "status-bar online";
            bar.innerHTML = pendientes > 0 ? `🟢 Online - Sincronizando ${pendientes}...` : "🟢 Online - Todo al día";
            if (pendientes > 0) {
                const todos = await db.registros.where('estado').equals('Pendiente').toArray();
                todos.forEach(r => enviarAGoogle(r.id, r));
            }
        } else {
            bar.className = "status-bar offline";
            bar.innerHTML = `🔴 Offline - ${pendientes} registros pendientes`;
        }
    }

    window.addEventListener('online', actualizarEstadoUI);
    window.addEventListener('offline', actualizarEstadoUI);
    
    iniciar();
</script>

</body>
</html>
